services:
  app:
    build: .
    ports:
      - "3100:3100"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3100
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET in .env}
      # - APP_NAME=jhabit
      # - MCP_SERVER_URL=https://mcp.example.com
    restart: unless-stopped
